name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel a running one so
# in-flight deploys complete cleanly.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Stage artifact
        run: |
          mkdir -p dist
          cp index.html dist/
          sha256sum dist/index.html | awk '{print $1}' > dist/sha256.txt
          {
            echo "commit:    ${GITHUB_SHA}"
            echo "ref:       ${GITHUB_REF}"
            echo "built_at:  $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "repo:      ${GITHUB_REPOSITORY}"
          } > dist/version.txt

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
